# # Delegate oh-my-tmux shell helpers when TMUX_CONF is piped through cut -c3-.
# upstream_tmux_conf="${XDG_CONFIG_HOME:-$HOME/.config}/tmux/oh-my-tmux/.tmux.conf"
# if [ -f "$upstream_tmux_conf" ]; then
#   cut -c3- "$upstream_tmux_conf" | sh -s "$@"
#   exit $?
# fi
#
# # Keep runtime plugin state outside the stowed repo.
run-shell 'tmux set-environment -g TMUX_PLUGIN_MANAGER_PATH "${XDG_DATA_HOME:-$HOME/.local/share}/tmux/plugins/"'

# # Source the pinned upstream config, then layer repo-managed modules on top.
source-file ~/.config/tmux/oh-my-tmux/.tmux.conf
source-file ~/.config/tmux/conf.d/10-core.conf
source-file ~/.config/tmux/conf.d/20-theme.conf
source-file ~/.config/tmux/conf.d/30-status.conf
source-file ~/.config/tmux/conf.d/40-navigation.conf
source-file ~/.config/tmux/conf.d/50-borders.conf
