lvim:
  # Flujo de mantenimiento:
  # 1) declara/edita aquí los keymaps de LVim;
  # 2) usa aliases de plugin y acciones semánticas cuando existan;
  # 3) regenera con ~/.config/wm-shared/scripts/bin/system/sync_keybinds.sh --target lvim.
  # Alias declarativos para evitar repetir nombres de plugins en cada binding.
  plugin_aliases:
    aerial: aerial.nvim
    blink: blink.cmp
    coverage: nvim-coverage
    dapui: nvim-dap-ui
    dbui: vim-dadbod-ui
    flash: flash.nvim
    iron: iron.nvim
    kulala: kulala.nvim
    lean: lean.nvim
    molten: molten-nvim
    neotest: neotest
    noice: noice.nvim
    obsidian: obsidian.nvim
    persistence: "folke/persistence.nvim"
    rainbowcsv: rainbow_csv
    todocomments: todo-comments.nvim
    trouble: trouble.nvim
  items:
    - kind: section
      title: "🤖 INTELIGENCIA ARTIFICIAL"
    - kind: group
      writer: assign
      target: m
      key: G
      name: IA / LLM
      entries:
        - key: c
          command: "<cmd>CodeCompanionChat Toggle<cr>"
          description: Chat IA
        - key: a
          command: "<cmd>CodeCompanionActions<cr>"
          description: Acciones IA
        - key: i
          command: "<cmd>CodeCompanion<cr>"
          description: Prompt Inline
        - key: s
          command: "<cmd>LvimAIStatus<cr>"
          description: Estado IA
        - key: h
          command: "<cmd>LvimSetupInfo<cr>"
          description: Setup y Health
        - key: p
          command: "<cmd>LvimAIProviders<cr>"
          description: Ver Providers IA
        - key: P
          command: "<cmd>LvimAISelectProvider<cr>"
          description: Seleccionar Provider IA
        - key: m
          command: "<cmd>LvimAISelectModel<cr>"
          description: Seleccionar Modelo IA
        - key: r
          command: "<cmd>LvimAIReset<cr>"
          description: Reset Overrides IA
    - kind: section
      title: "📑 GESTIÓN DE BUFFERS Y TABS"
    - kind: group
      writer: wk_extend
      key: b
      name: Buffers
      entries:
        - key: n
          command: "<cmd>BufferLineCycleNext<cr>"
          description: Siguiente Buffer
        - key: p
          command: "<cmd>BufferLineCyclePrev<cr>"
          description: Buffer Anterior
        - key: d
          command: "<cmd>BufferKill<cr>"
          description: Cerrar Buffer Actual
        - key: D
          command: "<cmd>BufferLineCloseOthers<cr>"
          description: Cerrar Otros Buffers
        - key: b
          lua: "function() Snacks.picker.buffers() end"
          description: Buscar Buffer
        - key: e
          command: "<cmd>BufferLinePickClose<cr>"
          description: Elegir Buffer a Cerrar
        - key: P
          command: "<cmd>BufferLinePick<cr>"
          description: Ir a Buffer (Pick)
        - key: L
          command: "<cmd>BufferLineCloseRight<cr>"
          description: Cerrar Buffers a la Derecha
        - key: H
          command: "<cmd>BufferLineCloseLeft<cr>"
          description: Cerrar Buffers a la Izquierda
        - key: s
          command: "<cmd>BufferLineSortByDirectory<cr>"
          description: Ordenar por Directorio
        - key: l
          command: "<cmd>BufferLineSortByExtension<cr>"
          description: Ordenar por Extensión
        - key: "1"
          command: "<cmd>BufferLineGoToBuffer 1<cr>"
          description: Ir a Buffer 1
        - key: "2"
          command: "<cmd>BufferLineGoToBuffer 2<cr>"
          description: Ir a Buffer 2
        - key: "3"
          command: "<cmd>BufferLineGoToBuffer 3<cr>"
          description: Ir a Buffer 3
        - key: "4"
          command: "<cmd>BufferLineGoToBuffer 4<cr>"
          description: Ir a Buffer 4
        - key: "5"
          command: "<cmd>BufferLineGoToBuffer 5<cr>"
          description: Ir a Buffer 5
    - kind: section
      title: "💻 HERRAMIENTAS DE INGENIERÍA"
    - kind: binding
      target: m
      key: j
      command: "<cmd>TSJToggle<cr>"
      description: Join/Split Código (TreeSJ)
    - kind: binding
      target: m
      key: R
      action: http-run
      description: Ejecutar Request HTTP
    - kind: group
      writer: assign
      target: m
      key: T
      name: Testing
      plugins:
        - neotest
      entries:
        - key: t
          lua: 'function() require("neotest").run.run() end'
          description: Ejecutar Test Cercano
        - key: f
          lua: 'function() require("neotest").run.run(vim.fn.expand("%")) end'
          description: Ejecutar Archivo Actual
        - key: s
          lua: 'function() require("neotest").summary.toggle() end'
          description: Panel de Resultados
        - key: o
          lua: 'function() require("neotest").output.open({ enter = true }) end'
          description: Ver Output de Test
        - key: x
          lua: 'function() require("neotest").run.stop() end'
          description: Detener Test
        - key: d
          lua: 'function() require("neotest").run.run({ strategy = "dap" }) end'
          description: Ejecutar Test con DAP
        - key: c
          command: "<cmd>CoverageSummary<cr>"
          description: Resumen de Coverage
        - key: v
          command: "<cmd>Coverage<cr>"
          description: Mostrar Coverage
        - key: h
          command: "<cmd>CoverageHide<cr>"
          description: Ocultar Coverage
        - key: R
          command: "<cmd>LvimCoverageRefresh<cr>"
          description: Recargar Coverage
    - kind: group
      writer: assign
      target: m
      key: D
      name: Database
      plugins:
        - dbui
      entries:
        - key: u
          action: dbui-toggle
          description: Abrir/Cerrar Panel DB
        - key: f
          action: dbui-find-buffer
          description: Buscar Buffer DB
        - key: a
          action: dbui-add-connection
          description: Añadir Conexión
    - kind: group
      writer: wk_extend
      key: g
      name: Git
      entries:
        - key: v
          command: "<cmd>DiffviewOpen<cr>"
          description: Abrir Diffview (3-way merge)
        - key: h
          command: "<cmd>DiffviewFileHistory %<cr>"
          description: Historial del Archivo Actual
        - key: x
          command: "<cmd>DiffviewClose<cr>"
          description: Cerrar Diffview
        - key: g
          lua: 'function() Snacks.lazygit() end'
          description: Abrir Lazygit
        - key: l
          lua: 'function() Snacks.lazygit.log() end'
          description: Git Log (Lazygit)
        - key: s
          command: "<cmd>Gitsigns stage_hunk<cr>"
          description: Stage Hunk
        - key: r
          command: "<cmd>Gitsigns reset_hunk<cr>"
          description: Reset Hunk
        - key: S
          command: "<cmd>Gitsigns stage_buffer<cr>"
          description: Stage Buffer Completo
        - key: R
          command: "<cmd>Gitsigns reset_buffer<cr>"
          description: Reset Buffer Completo
        - key: u
          command: "<cmd>Gitsigns undo_stage_hunk<cr>"
          description: Deshacer Stage Hunk
        - key: p
          command: "<cmd>Gitsigns preview_hunk<cr>"
          description: Preview Hunk (Flotante)
        - key: B
          command: "<cmd>Gitsigns blame_line<cr>"
          description: Blame Línea Actual
        - key: D
          command: "<cmd>Gitsigns diffthis<cr>"
          description: Diff Archivo Actual
    - kind: group
      writer: assign
      target: m
      key: x
      name: "Trouble (Diagnósticos)"
      entries:
        - key: x
          action: trouble-diagnostics
          description: Diagnósticos del Proyecto
        - key: X
          action: trouble-diagnostics-buffer
          description: Diagnósticos (Buffer Actual)
        - key: q
          action: trouble-qflist
          description: Quickfix List
        - key: l
          action: trouble-loclist
          description: Location List
        - key: r
          action: trouble-lsp
          description: Referencias LSP
        - key: t
          action: trouble-todo
          description: Ver TODOs del Proyecto
        - key: T
          action: trouble-todo-buffer
          description: Ver TODOs (Buffer Actual)
    - kind: section
      title: "🎓 ENTORNOS ESPECÍFICOS"
    - kind: group
      writer: assign
      target: m
      key: C
      name: LeetCode
      plugins:
        - "kawre/leetcode.nvim"
      entries:
        - key: c
          command: "<cmd>Leet<cr>"
          description: Abrir Dashboard
        - key: r
          command: "<cmd>Leet run<cr>"
          description: Ejecutar Código (Run)
        - key: s
          command: "<cmd>Leet submit<cr>"
          description: Enviar Solución (Submit)
        - key: l
          command: "<cmd>Leet list<cr>"
          description: Lista de Problemas
        - key: i
          command: "<cmd>Leet info<cr>"
          description: Info del Problema
    - kind: group
      writer: assign
      target: m
      key: L
      name: LaTeX
      plugins:
        - "lervag/vimtex"
      entries:
        - key: c
          command: "<cmd>VimtexCompile<cr>"
          description: Compilar (Start/Stop)
        - key: v
          command: "<cmd>VimtexView<cr>"
          description: Ver PDF
        - key: e
          command: "<cmd>VimtexErrors<cr>"
          description: Mostrar Errores
        - key: t
          command: "<cmd>VimtexTocOpen<cr>"
          description: Tabla de Contenidos
        - key: x
          command: "<cmd>VimtexClean<cr>"
          description: Limpiar Archivos Auxiliares
    - kind: binding
      target: m
      key: i
      action: lean-infoview
      description: Lean Infoview
    - kind: section
      title: "🧠 ATAJOS LSP"
    - kind: group
      writer: assign
      target: m
      key: l
      name: LSP
      entries:
        - key: a
          ref: vim.lsp.buf.code_action
          description: Code Actions
        - key: d
          ref: vim.lsp.buf.definition
          description: Ir a Definición
        - key: D
          ref: vim.lsp.buf.declaration
          description: Ir a Declaración
        - key: h
          ref: vim.lsp.buf.hover
          description: Hover / Documentación
        - key: i
          ref: vim.lsp.buf.implementation
          description: Ir a Implementación
        - key: r
          ref: vim.lsp.buf.rename
          description: Renombrar Símbolo
        - key: R
          ref: vim.lsp.buf.references
          description: Referencias
        - key: s
          ref: vim.lsp.buf.signature_help
          description: Ayuda de Firma
        - key: t
          ref: vim.lsp.buf.type_definition
          description: Ir a Definición de Tipo
    - kind: group
      writer: wk_extend_v
      key: l
      name: LSP
      entries:
        - key: a
          ref: vim.lsp.buf.code_action
          description: Code Actions
    - kind: section
      title: "🗺️ NAVEGACIÓN, ARCHIVOS Y BÚSQUEDA"
    - kind: group
      writer: assign
      target: m
      key: a
      name: Aerial
      entries:
        - key: t
          action: aerial-toggle
          description: Toggle Outline
        - key: n
          action: aerial-nav-toggle
          description: Toggle Nav
        - key: j
          action: aerial-next
          description: Siguiente Símbolo
        - key: k
          action: aerial-prev
          description: Símbolo Anterior
    - kind: binding
      target: m
      key: e
      lua: 'function() require("ranger-nvim").open(true) end'
      plugins:
        - "kelly-lin/ranger.nvim"
      description: Explorador (Ranger)
    - kind: binding
      target: m
      key: f
      command: "<cmd>lua Snacks.picker.smart()<cr>"
      description: Smart Find
    - kind: group
      writer: assign
      target: m
      key: s
      name: "Search (Snacks)"
      entries:
        - key: f
          command: "<cmd>lua Snacks.picker.files()<cr>"
          description: Archivos
        - key: g
          command: "<cmd>lua Snacks.picker.grep()<cr>"
          description: Grep (Texto)
        - key: b
          command: "<cmd>lua Snacks.picker.buffers()<cr>"
          description: Buffers Activos
        - key: n
          action: notifications
          description: Notificaciones
        - key: h
          command: "<cmd>lua Snacks.picker.help()<cr>"
          description: Help Tags
        - key: c
          command: "<cmd>lua Snacks.picker.commands()<cr>"
          description: Comandos
        - key: k
          command: "<cmd>lua Snacks.picker.keymaps()<cr>"
          description: Keymaps
        - key: r
          command: "<cmd>lua Snacks.picker.recent()<cr>"
          description: Archivos Recientes
        - key: w
          command: "<cmd>lua Snacks.picker.grep_word()<cr>"
          description: Palabra Bajo Cursor
        - key: d
          command: "<cmd>lua Snacks.picker.diagnostics()<cr>"
          description: Diagnósticos
        - key: R
          command: "<cmd>lua Snacks.picker.resume()<cr>"
          description: Reanudar Última Búsqueda
        - key: s
          command: "<cmd>lua Snacks.picker.smart()<cr>"
          description: Smart Find
