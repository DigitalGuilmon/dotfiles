general {
    no_fade_in = false
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = screenshot # Usa la imagen actual de la pantalla
    color = rgba(25, 20, 20, 1.0)
    blur_passes = 3 # Desenfoque consistente con tu appearance.conf
    blur_size = 8
}

input-field {
    monitor =
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = true
    outer_color = rgb(c678dd) # Morado
    inner_color = rgb(282c34)
    font_color = rgb(f8f8f2)
    fade_on_empty = true
    placeholder_text = <i>Ingresa contraseña...</i>
    hide_input = false
    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor =
    text = $TIME
    color = rgb(f8f8f2)
    font_size = 64
    font_family = JetBrainsMono Nerd Font # Tu fuente principal
    position = 0, 80
    halign = center
    valign = center
}
