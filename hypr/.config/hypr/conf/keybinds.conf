# =============================================================================
# HYPRLAND KEYBINDINGS
# =============================================================================

source = ~/.config/hypr/conf/keybinds/launchers.conf

# =============================================================================
# 🧠 SCRIPTS - Acceso directo a herramientas (SUPER + letra mnemónica)
# =============================================================================

bind = SUPER, A, exec, ~/.config/hypr/scripts/ai/ai_menu.hs                      # [A]I
bind = SUPER, S, exec, ~/.config/hypr/scripts/system/system_utils.hs              # [S]istema
bind = SUPER, M, exec, ~/.config/hypr/scripts/multimedia/multimedia_menu.hs       # [M]ultimedia
bind = SUPER, N, exec, ~/.config/hypr/scripts/network/network_menu.hs             # [N]etwork
bind = SUPER, P, exec, ~/.config/hypr/scripts/multimedia/screenshot.hs            # [P]rint / Captura
bind = SUPER, D, exec, ~/.config/hypr/scripts/productivity/todo.hs                # to[D]o List
bind = SUPER, W, exec, ~/.config/hypr/scripts/system/window_manager.hs            # [W]indows
bind = SUPER, O, exec, swaync-client -t -sw                                       # N[O]tificaciones
bind = SUPER, E, exec, ~/.config/hypr/scripts/productivity/english.hs             # [E]nglish Tutor
bind = SUPER, G, exec, ~/.config/hypr/scripts/multimedia/steam_menu.hs            # [G]ames / Steam
bind = SUPER, I, exec, ~/.config/hypr/scripts/system/keybind_cheatsheet.hs        # [I]nfo Keybindings

source = ~/.config/hypr/conf/keybinds/contextual.conf
source = ~/.config/hypr/conf/keybinds/windows.conf

# =============================================================================
# 🛠️ SISTEMA - Shift para acciones de cambio de estado
# =============================================================================

bind = SUPER SHIFT, R, exec, hyprctl reload && notify-send -e -h string:x-canonical-private-synchronous:sys-notify -u low "Sistema" "Configuración Recargada" -i software-update-available
bind = SUPER SHIFT, W, exec, pkill waybar; waybar & disown && notify-send -e -h string:x-canonical-private-synchronous:sys-notify -u low "Waybar" "Barra de estado reiniciada" -i dropboxstatus-logo
bind = SUPER SHIFT, Q, exec, wlogout                                               # Logout
bind = SUPER CTRL SHIFT, Q, exit                                                   # Salida forzosa

source = ~/.config/hypr/conf/keybinds/workspaces.conf
source = ~/.config/hypr/conf/keybinds/hardware.conf

# =============================================================================
# 🖱️ MOUSE
# =============================================================================

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
