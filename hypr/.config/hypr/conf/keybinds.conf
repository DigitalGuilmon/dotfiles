# =============================================================================
# HYPRLAND KEYBINDINGS - MODULAR EDITION
# =============================================================================

source = ~/.config/hypr/conf/keybinds/variables.conf
source = ~/.config/hypr/conf/keybinds/launchers.conf
# =============================================================================
# 🧠 SCRIPTS Y MENÚS (Mod = Acción directa)
# =============================================================================

bind = $mainMod, A, exec, $wmScripts/ai/ai_menu.hs                  # [A]I
bind = $mainMod, S, exec, $wmScripts/system/system_utils.hs         # [S]istema
bind = $mainMod, M, exec, $wmScripts/multimedia/multimedia_menu.hs  # [M]ultimedia
bind = $mainMod, N, exec, $wmScripts/network/network_menu.hs        # [N]etwork
bind = $mainMod, P, exec, $wmScripts/multimedia/screenshot.hs       # [P]rint / Captura
bind = $mainMod, I, exec, $wmScripts/productivity/todo.hs           # [I]tems / TODO List
bind = $mainMod, D, exec, $wmScripts/system/window_manager.hs --list # [D]isplay / Todas las ventanas
bind = $mainMod, W, exec, $wmScripts/system/window_manager.hs       # [W]indows
bind = $mainMod, Escape, exec, $wmScripts/system/window_manager.hs --close-all # Cerrar todas las ventanas
bind = $mainMod, O, exec, $notif -t -sw                           # N[O]tificaciones
source = ~/.config/hypr/conf/keybinds/contextual.conf
source = ~/.config/hypr/conf/keybinds/windows.conf
source = ~/.config/hypr/conf/keybinds/system.conf
source = ~/.config/hypr/conf/keybinds/workspaces.conf
source = ~/.config/hypr/conf/keybinds/hardware.conf
source = ~/.config/hypr/conf/keybinds/mouse.conf
