# =============================================================================
# HYPRLAND KEYBINDINGS - MODULAR EDITION
# =============================================================================

source = ~/.config/hypr/conf/keybinds/variables.conf
source = ~/.config/hypr/conf/keybinds/launchers.conf
# =============================================================================
# 🧠 SCRIPTS Y MENÚS (Mod = Acción directa)
# =============================================================================

bind = $mainMod, A, exec, ~/.config/hypr/scripts/ai/ai_menu.hs                  # [A]I
bind = $mainMod, S, exec, ~/.config/hypr/scripts/system/system_utils.hs          # [S]istema
bind = $mainMod, M, exec, ~/.config/hypr/scripts/multimedia/multimedia_menu.hs   # [M]ultimedia
bind = $mainMod, N, exec, ~/.config/hypr/scripts/network/network_menu.hs         # [N]etwork
bind = $mainMod, P, exec, ~/.config/hypr/scripts/multimedia/screenshot.hs        # [P]rint / Captura
bind = $mainMod, I, exec, ~/.config/hypr/scripts/productivity/todo.hs            # [I]tems / TODO List
bind = $mainMod, D, exec, ~/.config/hypr/scripts/system/window_manager.hs --list # [D]isplay / Todas las ventanas
bind = $mainMod, W, exec, ~/.config/hypr/scripts/system/window_manager.hs        # [W]indows
bind = $mainMod, Escape, exec, ~/.config/hypr/scripts/system/window_manager.hs --close-all # Cerrar todas las ventanas
bind = $mainMod, O, exec, $notif -t -sw                           # N[O]tificaciones
source = ~/.config/hypr/conf/keybinds/contextual.conf
source = ~/.config/hypr/conf/keybinds/windows.conf
source = ~/.config/hypr/conf/keybinds/system.conf
source = ~/.config/hypr/conf/keybinds/workspaces.conf
source = ~/.config/hypr/conf/keybinds/hardware.conf
source = ~/.config/hypr/conf/keybinds/mouse.conf
