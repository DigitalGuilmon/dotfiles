# =============================================================================
# KEYBINDINGS - CONFIGURACIÓN OPTIMIZADA Y SIN ERRORES
# =============================================================================

# --- Sistema ---
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod SHIFT, Q, exec, wlogout
bind = $mainMod CTRL, Q, exit
bind = $mainMod SHIFT, W, exec, killall waybar; waybar & disown

# --- Aplicaciones Principales ---
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, D, exec, $menu
bind = $mainMod, B, exec, $browser
bind = $mainMod, V, exec, $terminal -e lvim
bind = $mainMod, N, exec, swaync-client -t -sw       # Notificaciones directas

# --- Scripts Haskell (Lógica Mejorada: SUPER para acción, ALT para menú) ---
# Tecla P (Captura vs Productividad)
bind = $mainMod, P, exec, ~/.config/hypr/scripts/screenshot.hs
bind = $mainMod ALT, P, exec, ~/.config/hypr/scripts/productivity_menu.hs

# Tecla N (Notificaciones vs Redes)
bind = $mainMod ALT, N, exec, ~/.config/hypr/scripts/network_menu.hs

# Tecla W (Ventanas vs Wallpapers)
bind = $mainMod, W, exec, ~/.config/hypr/scripts/window_manager.hs
bind = $mainMod ALT, W, exec, ~/.config/hypr/scripts/wallpaper_universe.hs

# Otros Menús
bind = $mainMod, A, exec, ~/.config/hypr/scripts/ai_menu.hs
bind = $mainMod, G, exec, ~/.config/hypr/scripts/steam_menu.hs
bind = $mainMod, S, exec, ~/.config/hypr/scripts/system_utils.hs
bind = $mainMod, M, exec, ~/.config/hypr/scripts/multimedia_menu.hs

# --- Gestión de Ventanas ---
bind = $mainMod, X, killactive
bind = $mainMod, F, fullscreen
bind = $mainMod, T, togglefloating
bind = $mainMod, Space, layoutmsg, swapwithmaster
bind = $mainMod, C, centerwindow

# Navegación estilo Vim
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Redimensionar
binde = $mainMod CTRL, L, resizeactive, 30 0
binde = $mainMod CTRL, H, resizeactive, -30 0
binde = $mainMod CTRL, K, resizeactive, 0 -30
binde = $mainMod CTRL, J, resizeactive, 0 30

# --- Workspaces ---
bind = $mainMod, Tab, workspace, e+1
bind = $mainMod SHIFT, Tab, workspace, e-1
bind = $mainMod, 1, workspace, 1
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# --- Controles Hardware ---
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindle = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindle = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# --- Mouse ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
