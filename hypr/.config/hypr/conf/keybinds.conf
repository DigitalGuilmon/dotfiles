# =============================================================================
# KEYBINDINGS - CONFIGURACIÓN OPTIMIZADA
# =============================================================================

# --- Sistema y Gestión de Hyprland ---
bind = $mainMod SHIFT, R, exec, hyprctl reload       # Recargar configuración de Hyprland
bind = $mainMod SHIFT, Q, exec, wlogout              # Menú de salida/apagado
bind = $mainMod CTRL, Q, exit,                        # Forzar salida de Hyprland
bind = $mainMod SHIFT, W, exec, killall waybar; waybar & disown # Reiniciar Waybar

# --- Lanzadores de Aplicaciones ---
bind = $mainMod, Return, exec, $terminal             # Abrir Ghostty
bind = $mainMod, D, exec, $menu                      # Lanzador Rofi
bind = $mainMod, B, exec, $browser                   # Abrir Brave
bind = $mainMod, V, exec, $terminal -e lvim          # LunarVim en terminal
bind = $mainMod, N, exec, swaync-client -t -sw       # Panel de notificaciones

# --- Scripts Personalizados (Haskell/Bash) ---
bind = $mainMod, P, exec, ~/.config/hypr/scripts/screenshot.hs  # Captura de pantalla
#bind = $mainMod, W, exec, $wallpaperScript                      # Cambiar fondo de pantalla
bind = $mainMod, A, exec, ~/.config/hypr/scripts/ai_menu.hs     # Menú de IAs
bind = $mainMod, G, exec, ~/.config/hypr/scripts/steam_menu.hs  # Lanzador de Steam
bind = $mainMod SHIFT, B, exec, ~/.config/hypr/scripts/web_menu.hs # Menú web
bind = $mainMod, W, exec,  ~/.config/hypr/scripts/window_manager.hs

# --- Gestión de Ventanas ---
bind = $mainMod, X, killactive                       # Cerrar ventana activa
bind = $mainMod, F, fullscreen                       # Pantalla completa
bind = $mainMod, T, togglefloating                   # Alternar estado flotante
bind = $mainMod, Space, layoutmsg, swapwithmaster    # Mover a ventana principal (Master)
bind = $mainMod, C, centerwindow,                    # Centrar ventana (si es flotante)

# --- Navegación (Foco) ---
bind = $mainMod, H, movefocus, l                     # Izquierda
bind = $mainMod, L, movefocus, r                     # Derecha
bind = $mainMod, K, movefocus, u                     # Arriba
bind = $mainMod, J, movefocus, d                     # Abajo

# Navegación cíclica entre workspaces activos
bind = $mainMod, Tab, workspace, e+1          # Siguiente workspace activo
bind = $mainMod SHIFT, Tab, workspace, e-1    # Anterior workspace activo

# --- Organización (Mover Ventanas) ---
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# --- Redimensionar Ventanas (Modo Control) ---
binde = $mainMod CTRL, L, resizeactive, 30 0
binde = $mainMod CTRL, H, resizeactive, -30 0
binde = $mainMod CTRL, K, resizeactive, 0 -30
binde = $mainMod CTRL, J, resizeactive, 0 30

# --- Gestión de Workspaces (1-9) ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Mover ventana a Workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# --- Controles Multimedia (Requiere playerctl y brightnessctl) ---
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindle = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindle = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# --- Mouse Binds ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Network Management Menu
bind = $mainMod, N, exec, /home/elsadeveloper/.config/hypr/scripts/network_menu.hs

# Multimedia & Hardware Control Menu
bind = $mainMod, M, exec, /home/elsadeveloper/.config/hypr/scripts/multimedia_menu.hs

# Productivity & Workflow Menu
bind = $mainMod, P, exec, /home/elsadeveloper/.config/hypr/scripts/productivity_menu.hs

# System Utilities Menu
bind = $mainMod, S, exec, /home/elsadeveloper/.config/hypr/scripts/system_utils.hs
