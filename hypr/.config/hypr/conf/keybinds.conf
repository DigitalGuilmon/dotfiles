# =============================================================================
# HYPRLAND CONFIG - ARQUITECTURA LÓGICA Y SEMÁNTICA (2026)
# =============================================================================

# --- 1. VARIABLES DE APLICACIONES ---
$mainMod    = SUPER
$terminal   = ghostty
$browser    = brave
$editor     = $terminal -e lvim
$menu       = rofi -show drun
$notif      = swaync-client
$logout     = wlogout
$waybar     = waybar
$scrDir     = ~/.config/hypr/scripts

# --- 2. MOTOR DE NOTIFICACIONES (Sincronizado para evitar spam) ---
$sysNotif   = notify-send -e -h string:x-canonical-private-synchronous:sys-notify -u low

# --- 3. MACROS DE COMANDOS (Acción + Notificación) ---
$yt_cmd     = $browser --new-window https://youtube.com && $sysNotif "YouTube" "Abriendo en ventana nueva" -i youtube
$reload_cmd = hyprctl reload && $sysNotif "Sistema" "Configuración Recargada" -i software-update-available
$bar_reset  = pkill $waybar; $waybar & disown && $sysNotif "Waybar" "Barra de estado reiniciada" -i dropboxstatus-logo

# Hardware (Audio/Brillo)
$vol_up     = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ && $sysNotif "Volumen" "Subiendo" -i audio-volume-high
$vol_down   = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && $sysNotif "Volumen" "Bajando" -i audio-volume-low
$vol_mute   = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && $sysNotif "Audio" "Silencio (Mute)" -i audio-volume-muted
$bri_up     = brightnessctl set 5%+ && $sysNotif "Brillo" "Aumentando" -i display-brightness
$bri_down   = brightnessctl set 5%- && $sysNotif "Brillo" "Reduciendo" -i display-brightness-low

# --- 4. VARIABLES DE SCRIPTS ---
$vol_hs     = $scrDir/multimedia/volume.hs
$screenshot = $scrDir/multimedia/screenshot.hs

# =============================================================================
# KEYBINDINGS - LÓGICA DE MEMORIA
# =============================================================================

# --- 🚀 LANZADORES (Letra inicial de la App/Acción) ---
bind = $mainMod, Return, exec, $terminal             # [Return] -> Terminal
bind = $mainMod, Space,  exec, $menu                 # [Espacio] -> Menú global
bind = $mainMod, B,      exec, $browser              # [B]rowser
bind = $mainMod, V,      exec, $editor               # [V]im / Editor
bind = $mainMod, Y,      exec, $yt_cmd               # [Y]outube

# --- 🧠 SCRIPTS Y MENÚS (Mod = Acción directa) ---
bind = $mainMod, A, exec, $scrDir/ai/ai_menu.hs                  # [A]I
bind = $mainMod, S, exec, $scrDir/system/system_utils.hs          # [S]istema
bind = $mainMod, M, exec, $scrDir/multimedia/multimedia_menu.hs   # [M]ultimedia
bind = $mainMod, N, exec, $scrDir/network/network_menu.hs         # [N]etwork
bind = $mainMod, P, exec, $screenshot                             # [P]rint / Captura
bind = $mainMod, D, exec, $scrDir/productivity/todo.hs            # to[D]o List
bind = $mainMod, W, exec, $scrDir/system/window_manager.hs        # [W]indows
bind = $mainMod, O, exec, $notif -t -sw                           # N[O]tificaciones

# --- 🔧 MENÚS CONTEXTUALES (Alt = Herramientas especializadas) ---
bind = $mainMod ALT, W, exec, $scrDir/system/wallpaper_universe.hs    # [W]allpaper
bind = $mainMod ALT, V, exec, $vol_hs                                 # [V]olumen
bind = $mainMod ALT, G, exec, $scrDir/multimedia/steam_menu.hs        # [G]ames / Steam
bind = $mainMod ALT, D, exec, $scrDir/system/docker.hs                # [D]ocker
bind = $mainMod ALT, C, exec, $scrDir/productivity/calculator.hs      # [C]alculadora
bind = $mainMod ALT, E, exec, $scrDir/productivity/english.hs         # [E]nglish Tutor
bind = $mainMod ALT, P, exec, $scrDir/productivity/productivity_menu.hs # [P]roductividad
bind = $mainMod ALT, O, exec, $scrDir/productivity/color_picker.hs    # C[O]lor Picker
bind = $mainMod ALT, K, exec, $scrDir/system/keybind_cheatsheet.hs    # [K]eybindings
bind = $mainMod ALT, B, exec, $scrDir/network/web_menu.hs             # [B]ookmarks Web
bind = $mainMod ALT, T, exec, $scrDir/system/prompt.hs                # Promp[T]s IA
bind = $mainMod ALT, F, exec, $scrDir/network/download.hs             # [F]icheros / Descargas

# --- 🪟 GESTIÓN DE VENTANAS (Consistencia Vim) ---
bind = $mainMod, X,      killactive                  # E[X]it / Cerrar
bind = $mainMod, F,      fullscreen                  # [F]ullscreen
bind = $mainMod, T,      togglefloating              # [T]oggle Floating
bind = $mainMod, C,      centerwindow                # [C]enter
bind = $mainMod, Tab,    workspace, e+1              # Ciclar workspaces

# Navegación y Movimiento (HJKL)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Redimensionar (Control de precisión)
binde = $mainMod CTRL, L, resizeactive, 30 0
binde = $mainMod CTRL, H, resizeactive, -30 0
binde = $mainMod CTRL, K, resizeactive, 0 -30
binde = $mainMod CTRL, J, resizeactive, 0 30

# --- 🛠️ ESTADO DEL SISTEMA (Shift para acciones de cambio) ---
bind = $mainMod SHIFT, R, exec, $reload_cmd
bind = $mainMod SHIFT, W, exec, $bar_reset
bind = $mainMod SHIFT, Q, exec, $logout
bind = $mainMod CTRL SHIFT, Q, exit                  # Salida forzosa

# --- 🔢 WORKSPACES (Dinámicos) ---
# Foco
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Mover Ventana
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# --- 🔊 CONTROLES HARDWARE (Flags: l=Locked, e=Repeat) ---
bindle = , XF86AudioRaiseVolume,  exec, $vol_hs up
bindle = , XF86AudioLowerVolume,  exec, $vol_hs down
bindl  = , XF86AudioMute,         exec, $vol_hs mute
bindle = , XF86MonBrightnessUp,   exec, $bri_up
bindle = , XF86MonBrightnessDown, exec, $bri_down

# --- 🖱️ MOUSE ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
