bind = $mainMod, U,     exec, ~/.config/hypr/scripts/system/wallpaper_universe.hs    # [U]niverse / Wallpaper
bind = $mainMod, R,     exec, ~/.config/hypr/scripts/system/layout_menu.hs           # [R]edistribuir / Tiling
bind = $mainMod ALT, V, exec, ~/.config/hypr/scripts/multimedia/volume.hs           # [V]olumen
bind = $mainMod, G,     exec, ~/.config/hypr/scripts/multimedia/steam_menu.hs        # [G]ames / Steam
bind = $mainMod ALT, D, exec, ~/.config/hypr/scripts/system/docker.hs                # [D]ocker
bind = $mainMod ALT, C, exec, ~/.config/hypr/scripts/productivity/calculator.hs      # [C]alculadora
bind = $mainMod, E,     exec, ~/.config/hypr/scripts/productivity/english.hs         # [E]nglish Tutor
bind = $mainMod ALT, P, exec, ~/.config/hypr/scripts/productivity/productivity_menu.hs # [P]roductividad
bind = $mainMod ALT, O, exec, ~/.config/hypr/scripts/productivity/color_picker.hs    # C[O]lor Picker
bind = $mainMod ALT, K, exec, ~/.config/hypr/scripts/system/keybind_cheatsheet.hs    # [K]eybindings
bind = $mainMod, B,     exec, ~/.config/hypr/scripts/network/web_menu.hs             # [B]ookmarks Web
bind = $mainMod, Q,     exec, ~/.config/hypr/scripts/system/prompt.hs                # [Q]uery / Prompts IA
bind = $mainMod ALT, F, exec, ~/.config/hypr/scripts/network/download.hs             # [F]icheros / Descargas
