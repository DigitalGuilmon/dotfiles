# -----------------------------------------------------------------------------
# Generated from wm-shared/.config/wm-shared/keybinds.yml
# Do not edit manually. Run ~/.config/wm-shared/scripts/bin/system/sync_keybinds.sh --target hypr
# -----------------------------------------------------------------------------

# =============================================================================
# Launchers
# =============================================================================
# Terminal
bind = $mainMod, Return, exec, $terminal
# Menú global
bind = $mainMod, Space, exec, $menu
# Navegador
bind = $mainMod SHIFT, B, exec, $browser
# Editor
bind = $mainMod, V, exec, $editor
# YouTube
bind = $mainMod, Y, exec, $yt_cmd

# =============================================================================
# Menus
# =============================================================================
# AI
bind = $mainMod, A, exec, $wmScripts/ai/ai_menu.hs
# Sistema / energía
bind = $mainMod, S, exec, $wmScripts/system/system_utils.hs
# Multimedia
bind = $mainMod, M, exec, $wmDispatch multimedia-menu
# Red
bind = $mainMod, N, exec, $wmScripts/network/network_menu.hs
# Captura
bind = $mainMod, P, exec, $wmScripts/multimedia/screenshot.hs
# Captura (tecla Logitech MX)
bind = $mainMod SHIFT, S, exec, $wmScripts/multimedia/screenshot.hs
# TODO
bind = $mainMod, I, exec, $wmScripts/productivity/todo.hs
# Mostrar ventanas
bind = $mainMod, D, exec, $wmScripts/system/window_manager.hs --list
# Gestión de ventanas
bind = $mainMod, W, exec, $wmScripts/system/window_manager.hs
# Cerrar todas las ventanas
bind = $mainMod, Escape, exec, $wmScripts/system/window_manager.hs --close-all
# Centro de notificaciones
bind = $mainMod, O, exec, $wmDispatch notifications

# =============================================================================
# Contextual
# =============================================================================
# Wallpaper
bind = $mainMod, U, exec, $wmScripts/system/wallpaper_universe.hs
# Layout / tiling
bind = $mainMod, R, exec, $wmScripts/system/layout_menu.hs
# Menú volumen
bind = $mainMod ALT, V, exec, $wmScripts/multimedia/volume.hs menu
# Steam
bind = $mainMod, G, exec, $wmScripts/multimedia/steam_menu.hs
# Docker
bind = $mainMod ALT, D, exec, $wmScripts/system/docker.hs
# Calculadora
bind = $mainMod ALT, C, exec, $wmScripts/productivity/calculator.hs
# Inglés
bind = $mainMod, E, exec, $wmScripts/productivity/english.hs
# Menú productividad
bind = $mainMod ALT, P, exec, $wmDispatch productivity-menu
# Color picker
bind = $mainMod ALT, O, exec, $wmScripts/productivity/color_picker.hs
# Cheatsheet keybinds
bind = $mainMod ALT, K, exec, $wmScripts/system/keybind_cheatsheet.hs
# Bookmarks web
bind = $mainMod, B, exec, $wmScripts/network/web_menu.hs
# YT-DLP
bind = $mainMod ALT, Y, exec, $wmScripts/network/yt_dlp_menu.hs
# Prompt shell / IA
bind = $mainMod, Q, exec, $wmScripts/system/prompt.hs
# Descargas
bind = $mainMod ALT, F, exec, $wmScripts/network/download.hs
# Proyectos
bind = $mainMod SHIFT, O, exec, $wmDispatch projects-menu
# Emoji picker
bind = $mainMod SHIFT, E, exec, $wmDispatch emoji-picker
# Timer
bind = $mainMod SHIFT, Y, exec, $wmDispatch timer-menu
# System info
bind = $mainMod SHIFT, I, exec, $wmDispatch system-info
# Portapapeles
bind = $mainMod ALT, X, exec, $wmDispatch clipboard-menu
# Menú workspaces
bind = $mainMod ALT, W, exec, $wmDispatch workspace-menu
# Menú scratchpads
bind = $mainMod ALT, S, exec, $wmDispatch scratchpad-menu
# Menú sesión
bind = $mainMod ALT, Q, exec, $wmDispatch session-menu
# Menú archivos
bind = $mainMod ALT, R, exec, $wmDispatch files-menu
# Menú bluetooth
bind = $mainMod ALT, B, exec, $wmDispatch bluetooth-menu
# Menú apariencia
bind = $mainMod ALT, U, exec, $wmDispatch appearance-menu

# =============================================================================
# System
# =============================================================================
# Recompilar / recargar WM
bind = $mainMod SHIFT, R, exec, $reload_cmd
# Reiniciar barras / WM
bind = $mainMod SHIFT, W, exec, $bar_reset
# Logout
bind = $mainMod SHIFT, Q, exec, $logout
# Salida forzosa
bind = $mainMod CTRL SHIFT, Q, exit

# =============================================================================
# Windows
# =============================================================================
# Cerrar ventana
bind = $mainMod, X, killactive
# Fullscreen
bind = $mainMod, F, fullscreen
# Toggle floating
bind = $mainMod, T, togglefloating
# Centrar ventana
bind = $mainMod, C, centerwindow
# Foco abajo
bind = $mainMod, J, movefocus, d
# Foco arriba
bind = $mainMod, K, movefocus, u
# Foco izquierda
bind = $mainMod, H, movefocus, l
# Foco derecha
bind = $mainMod, L, movefocus, r
# Mover ventana abajo
bind = $mainMod SHIFT, J, movewindow, d
# Mover ventana arriba
bind = $mainMod SHIFT, K, movewindow, u
# Mover ventana izquierda
bind = $mainMod SHIFT, H, movewindow, l
# Mover ventana derecha
bind = $mainMod SHIFT, L, movewindow, r
# Enviar a scratchpad
bind = $mainMod, Down, movetoworkspacesilent, special:scratchpad
# Mostrar scratchpad
bind = $mainMod, Up, togglespecialworkspace, scratchpad
# Resize derecha
binde = $mainMod CTRL, L, resizeactive, 30 0
# Resize izquierda
binde = $mainMod CTRL, H, resizeactive, -30 0
# Resize arriba
binde = $mainMod CTRL, K, resizeactive, 0 -30
# Resize abajo
binde = $mainMod CTRL, J, resizeactive, 0 30

# =============================================================================
# Workspaces
# =============================================================================
# Siguiente workspace
bind = $mainMod, Tab, workspace, e+1
# Workspace 1
bind = $mainMod, 1, workspace, 1
# Workspace 2
bind = $mainMod, 2, workspace, 2
# Workspace 3
bind = $mainMod, 3, workspace, 3
# Workspace 4
bind = $mainMod, 4, workspace, 4
# Workspace 5
bind = $mainMod, 5, workspace, 5
# Workspace 6
bind = $mainMod, 6, workspace, 6
# Workspace 7
bind = $mainMod, 7, workspace, 7
# Workspace 8
bind = $mainMod, 8, workspace, 8
# Workspace 9
bind = $mainMod, 9, workspace, 9
# Mover a workspace 1
bind = $mainMod SHIFT, 1, movetoworkspace, 1
# Mover a workspace 2
bind = $mainMod SHIFT, 2, movetoworkspace, 2
# Mover a workspace 3
bind = $mainMod SHIFT, 3, movetoworkspace, 3
# Mover a workspace 4
bind = $mainMod SHIFT, 4, movetoworkspace, 4
# Mover a workspace 5
bind = $mainMod SHIFT, 5, movetoworkspace, 5
# Mover a workspace 6
bind = $mainMod SHIFT, 6, movetoworkspace, 6
# Mover a workspace 7
bind = $mainMod SHIFT, 7, movetoworkspace, 7
# Mover a workspace 8
bind = $mainMod SHIFT, 8, movetoworkspace, 8
# Mover a workspace 9
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# =============================================================================
# Multimedia
# =============================================================================
# Captura rápida (tecla especial)
bind = , Print, exec, $wmScripts/multimedia/screenshot.hs
# Calculadora (tecla especial)
bind = , XF86Calculator, exec, $wmScripts/productivity/calculator.hs
# Subir volumen
binde = , XF86AudioRaiseVolume, exec, $wmScripts/multimedia/volume.hs up
# Bajar volumen
binde = , XF86AudioLowerVolume, exec, $wmScripts/multimedia/volume.hs down
# Mute
bind = , XF86AudioMute, exec, $wmScripts/multimedia/volume.hs mute
# Micrófono mute
bind = , XF86AudioMicMute, exec, $wmScripts/multimedia/volume.hs mic
# Pista anterior
bind = , XF86AudioPrev, exec, playerctl previous
# Reproducir / pausar
bind = , XF86AudioPlay, exec, playerctl play-pause
# Pista siguiente
bind = , XF86AudioNext, exec, playerctl next
# Brillo arriba
binde = , XF86MonBrightnessUp, exec, $bri_up
# Brillo abajo
binde = , XF86MonBrightnessDown, exec, $bri_down

# =============================================================================
# Mouse
# =============================================================================
# Mover ventana con mouse
bindm = $mainMod, mouse:272, movewindow
# Redimensionar ventana con mouse
bindm = $mainMod, mouse:273, resizewindow
