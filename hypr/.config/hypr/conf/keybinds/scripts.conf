# =============================================================================
# 🧠 SCRIPTS Y MENÚS (Mod = Acción directa)
# =============================================================================

bind = $mainMod, A, exec, ~/.config/hypr/scripts/ai/ai_menu.hs                  # [A]I
bind = $mainMod, S, exec, ~/.config/hypr/scripts/system/system_utils.hs          # [S]istema
bind = $mainMod, M, exec, ~/.config/hypr/scripts/multimedia/multimedia_menu.hs   # [M]ultimedia
bind = $mainMod, N, exec, ~/.config/hypr/scripts/network/network_menu.hs         # [N]etwork
bind = $mainMod, P, exec, ~/.config/hypr/scripts/multimedia/screenshot.hs        # [P]rint / Captura
bind = $mainMod, D, exec, ~/.config/hypr/scripts/productivity/todo.hs            # to[D]o List
bind = $mainMod, W, exec, ~/.config/hypr/scripts/system/window_manager.hs        # [W]indows
bind = $mainMod, O, exec, $notif -t -sw                           # N[O]tificaciones
