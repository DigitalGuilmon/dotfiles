# =============================================================================
# 🪟 GESTIÓN DE VENTANAS - Navegación estilo Vim
# =============================================================================

bind = SUPER, X,      killactive                     # E[X]it / Cerrar
bind = SUPER, F,      fullscreen                     # [F]ullscreen
bind = SUPER, T,      togglefloating                 # [T]oggle Floating
bind = SUPER, C,      centerwindow                   # [C]enter
bind = SUPER, Tab,    workspace, e+1                 # Ciclar workspaces

# Navegación y Movimiento (HJKL)
bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d

bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, L, movewindow, r
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, J, movewindow, d

# Redimensionar (Control de precisión)
binde = SUPER CTRL, L, resizeactive, 30 0
binde = SUPER CTRL, H, resizeactive, -30 0
binde = SUPER CTRL, K, resizeactive, 0 -30
binde = SUPER CTRL, J, resizeactive, 0 30
