# =============================================================================
# 🪟 GESTIÓN DE VENTANAS (Consistencia Vim)
# =============================================================================

bind = $mainMod, X,      killactive                  # E[X]it / Cerrar
bind = $mainMod, F,      fullscreen                  # [F]ullscreen
bind = $mainMod, T,      togglefloating              # [T]oggle Floating
bind = $mainMod, C,      centerwindow                # [C]enter
bind = $mainMod, Tab,    workspace, e+1              # Ciclar workspaces
bind = $mainMod, Down,   movetoworkspacesilent, special:scratchpad  # Enviar al scratchpad
bind = $mainMod, Up,     togglespecialworkspace, scratchpad   # Mostrar/ocultar scratchpad

# Navegación y Movimiento (HJKL)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Redimensionar (Control de precisión)
binde = $mainMod CTRL, L, resizeactive, 30 0
binde = $mainMod CTRL, H, resizeactive, -30 0
binde = $mainMod CTRL, K, resizeactive, 0 -30
binde = $mainMod CTRL, J, resizeactive, 0 30
