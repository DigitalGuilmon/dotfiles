# --- Decoración y Efectos (Optimizado) ---
general {
    gaps_in = 5
    gaps_out = 15
    border_size = 2
    # Degradado dinámico púrpura/verde basado en tu esquema actual
    col.active_border = rgba(c678ddff) rgba(98c379ff) 45deg 
    col.inactive_border = rgba(595959aa)
}

decoration {
    rounding = 12
    
    # Opacidad inteligente para enfoque
    active_opacity = 1.0
    inactive_opacity = 0.85
    
    blur {
        enabled = true
        size = 10           # Desenfoque más profundo
        passes = 4          # Más pasadas para suavidad premium
        new_optimizations = true
        xray = true         # Permite ver a través de ventanas flotantes
        noise = 0.02        # Textura de grano fino para realismo
        contrast = 1.0      # Mejora la legibilidad del texto sobre blur
        brightness = 0.9    # Oscurece ligeramente el fondo del blur
        vibrancy = 0.2      # Realza los colores que atraviesan el cristal
    }

    shadow {
        enabled = true
        range = 30
        render_power = 3
        # Sombras con tinte púrpura para efecto resplandor/neón
        color = rgba(c678dd55) 
        color_inactive = rgba(00000044)
    }
}

# --- Animaciones Premium (Tendencias 2025) ---
animations {
    enabled = yes

    # Curvas Bézier personalizadas
    bezier = wind, 0.05, 0.9, 0.1, 1.05        # Movimiento natural con micro-rebote
    bezier = winIn, 0.1, 1.1, 0.1, 1.0          # Entrada con overshoot sutil
    bezier = winOut, 0.3, -0.05, 0.9, 0.05      # Salida rápida y limpia
    bezier = liner, 0.0, 0.0, 1.0, 1.0          # Lineal para rotación de bordes
    bezier = md3_standard, 0.2, 0.0, 0, 1.0     # Material Design 3 estándar
    bezier = md3_decel, 0.05, 0.7, 0.1, 1       # MD3 desaceleración (entradas)
    bezier = md3_accel, 0.3, 0, 0.8, 0.15       # MD3 aceleración (salidas)

    # Ventanas: entradas con popin elegante, salidas con desvanecimiento
    animation = windowsIn, 1, 5, winIn, popin 80%
    animation = windowsOut, 1, 4, winOut, popin 80%
    animation = windowsMove, 1, 5, wind, slide

    # Desvanecimiento granular para transiciones suaves
    animation = fadeIn, 1, 4, md3_decel
    animation = fadeOut, 1, 3, md3_accel
    animation = fadeSwitch, 1, 5, md3_decel
    animation = fadeShadow, 1, 5, md3_decel
    animation = fadeDim, 1, 4, md3_standard
    animation = fadeLayers, 1, 3, md3_decel

    # Bordes con degradado rotativo (neón púrpura/verde)
    animation = border, 1, 5, md3_standard
    animation = borderangle, 1, 40, liner, loop

    # Espacios de trabajo con slidefade fluido
    animation = workspaces, 1, 5, wind, slidefade 30%
    animation = specialWorkspace, 1, 4, md3_decel, slidefadevert 20%
}
