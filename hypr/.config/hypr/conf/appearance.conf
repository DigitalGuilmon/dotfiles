# --- Apariencia ---
general {
    gaps_in = 8
    gaps_out = 20
    border_size = 2
    col.active_border = rgb(c678dd) rgb(98c379) 45deg
    col.inactive_border = rgba(282c34aa)
    layout = master
}

decoration {
    rounding = 12
    active_opacity = 1.0
    inactive_opacity = 0.9
    dim_inactive = true
    dim_strength = 0.15
    
    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = true
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00000066)
    }
}

animations {
    enabled = yes
    bezier = fluent_decel, 0, 0.2, 0.4, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    
    animation = windows, 1, 3, fluent_decel, popin 60%
    animation = border, 1, 5, default
    animation = borderangle, 1, 30, default, loop
    animation = fade, 1, 3, default
    animation = workspaces, 1, 3.5, easeOutExpo, slide
}

master {
    new_status = master
    mfact = 0.5
}
