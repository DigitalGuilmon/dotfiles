# =============================================================================
# HYPRLAND CONFIG - MODERN WAYLAND EDITION
# =============================================================================

# --- Monitores ---
monitor=,preferred,auto,1.6

env = LIBVA_DRIVER_NAME,radeonsi
env = VDPAU_DRIVER,radeonsi
env = GDK_SCALE,2
env = XCURSOR_SIZE,32
env = QT_AUTO_SCREEN_SCALE_FACTOR,1


# --- Variables de Entorno para HiDPI ---

# --- Variables de Aplicaciones (Alternativas Modernas) ---
$mainMod = SUPER
$terminal = ghostty
$fileManager = thunar
$menu = fuzzel                       # Más moderno/nativo que rofi
$browser = brave
$notifier = swaync                   # Centro de notificaciones moderno con GUI
$wallpaperScript = ~/.config/hypr/scripts/wallpaper_universe.sh

# --- Autostart ---
exec-once = swww-daemon
exec-once = $wallpaperScript         # Inicia con el fondo del universo
exec-once = waybar                   # Barra de estado
exec-once = swaync                   # Demonio de notificaciones
exec-once = hypridle                 # Gestión de inactividad nativa
exec-once = nm-applet --indicator
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP


# --- Teclado y Entrada ---
input {
    kb_layout = latam    # Establece el teclado a español latinoamericano
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0 # -1.0 a 1.0, 0 significa sin cambios
}

# --- Apariencia ---
general {
    gaps_in = 8
    gaps_out = 20
    border_size = 2
    col.active_border = rgb(c678dd) rgb(98c379) 45deg # Degradado dinámico
    col.inactive_border = rgba(282c34aa)
    layout = master
}

decoration {
    rounding = 12
    active_opacity = 1.0
    inactive_opacity = 0.9
    
    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        xray = true
    }

  }

# --- Animaciones Modernas ---
animations {
    enabled = yes
    bezier = fluent_decel, 0, 0.2, 0.4, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    
    animation = windows, 1, 3, fluent_decel, popin 60%
    animation = border, 1, 5, default
    animation = fade, 1, 3, default
    animation = workspaces, 1, 3.5, easeOutExpo, slide
}

master {
    new_status = master
    mfact = 0.5
}

# --- Atajos de Teclado ---

# Apps y Sistema
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, D, exec, $menu
bind = $mainMod, X, killactive
bind = $mainMod, V, exec, $terminal -e lvim
bind = $mainMod, B, exec, $browser
bind = $mainMod, N, exec, swaync-client -t -sw # Abrir panel de notificaciones
bind = $mainMod SHIFT, Q, exec, wlogout

# Utilidades de Captura (Grim + Slurp + Swappy para editar)
bind = $mainMod, P, exec, grim -g "$(slurp)" - | swappy -f -

# Wallpaper del Universo
bind = $mainMod, W, exec, $wallpaperScript

# Navegación (Focus)
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r

# Organización (Swap)
bind = $mainMod SHIFT, J, swapwindow, d
bind = $mainMod SHIFT, K, swapwindow, u
bind = $mainMod, Space, layoutmsg, swapwithmaster
bind = $mainMod, F, fullscreen
bind = $mainMod, T, togglefloating

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Atajos para mover ventana a Workspace (1-9)
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# --- Reglas de Ventana actualizadas para el flujo formal ---
windowrulev2 = workspace 1, class:^(jetbrains-idea|Code|lean|coq)$
windowrulev2 = workspace 2, class:^(Brave-browser|firefox)$
windowrulev2 = workspace 4, class:^(DBeaver)$
windowrulev2 = workspace 5, class:^(Postman|Insomnia)$
windowrulev2 = workspace 5, title:^(Z3|SMT|Verification)$
windowrulev2 = workspace 6, class:^(discord|TelegramDesktop)$
windowrulev2 = workspace 7, class:^(Steam|Spotify)$
windowrulev2 = workspace 7, class:^(org.pwmt.zathura|evince)$
windowrulev2 = workspace 8, class:^(btop)$
windowrulev2 = workspace 9, class:^(VirtualBox Manager)$

# Mejoras de flotación para diálogos
windowrulev2 = float, class:^(pavucontrol|blueman-manager|nm-connection-editor)$
windowrulev2 = float, title:^(Confirmar|Archivos)$

# --- Mouse Binds ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Variables de Entorno ---
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland;xcb
env = GDK_BACKEND,wayland,x11
