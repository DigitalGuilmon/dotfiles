# =============================================================================
# HYPRLAND CONFIG - MODULAR EDITION
# =============================================================================

source = ~/.config/hypr/conf/monitors.conf
source = ~/.config/hypr/conf/envs.conf
source = ~/.config/hypr/conf/apps.conf
# --- Autostart ---
exec-once = swww-daemon
exec-once = ~/.config/hypr/scripts/system/wallpaper_universe.hs
exec-once = waybar
exec-once = swaync
exec-once = hypridle
exec-once = nm-applet --indicator
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP PATH
source = ~/.config/hypr/conf/input.conf
source = ~/.config/hypr/conf/appearance.conf
source = ~/.config/hypr/conf/keybinds.conf
source = ~/.config/hypr/conf/rules.conf
