#-------------------------------------------
# Edición - LunarVim (lvim)
#-------------------------------------------
# Prioridad absoluta para código y texto
mime ^text,  label editor = lvim -- "$@"
mime ^text,  label pager  = "$PAGER" -- "$@"
!mime ^text, label editor, ext xml|json|csv|tex|py|pl|rb|js|sh|php|md|yml|toml|lua|js = lvim -- "$@"

#-------------------------------------------
# Navegación Web - Google Chrome como Rey
#-------------------------------------------
# Priorizamos Chrome en macOS
ext x?html?, has google-chrome, X, flag f = google-chrome -- "$@"
ext x?html?, has open,          X, flag f = open -a "Google Chrome" -- "$@"
ext x?html?, has surf,          X, flag f = surf -- file://"$1"
# Fallback nativo de Mac
ext x?html?, label open = open -- "$@"

#-------------------------------------------
# Documentos y PDF (Optimizado para Mac)
#-------------------------------------------
# En Mac, 'open' usa Vista Previa por defecto, que es excelente en M4
ext pdf, has open,     X, flag f = open -- "$@"
ext pdf, has zathura,  X, flag f = zathura -- "$@"

# Soporte para Office / iWork
ext pptx?|od[dfgpst]|docx?|sxc|xlsx?|xlt|xlw, has open = open -- "$@"

#-------------------------------------------
# Multimedia (MPV & QuickTime)
#-------------------------------------------
# MPV es excelente en Apple Silicon por su eficiencia
mime ^video|audio, has mpv,  X, flag f = mpv -- "$@"
mime ^video|audio, has open, X, flag f = open -- "$@"

#-------------------------------------------
# Imágenes
#-------------------------------------------
# 'open' abrirá Vista Previa, muy rápido en el M4
mime ^image, has open, X, flag f = open -- "$@"
mime ^image, has sxiv, X, flag f = sxiv -a -- "$@"
mime ^image, has gimp, X, flag f = gimp -- "$@"

#-------------------------------------------
# Archivos Comprimidos (atool o open)
#-------------------------------------------
ext 7z|ace|ar|arc|bz2?|cab|cpio|deb|gz|iso|jar|rar|tar|tgz|xz|zip, has atool = atool --list --each -- "$@" | "$PAGER"
ext 7z|ace|ar|arc|bz2?|cab|cpio|deb|gz|iso|jar|rar|tar|tgz|xz|zip, has open  = open -- "$@"

#-------------------------------------------
# Configuración de Terminal (macOS)
#-------------------------------------------
# Si usas iTerm2 o la terminal de Apple
mime ^ranger/x-terminal-emulator, has open = open -a Terminal.app "$@"
mime ^ranger/x-terminal-emulator, has kitty = kitty -- "$@"

#-------------------------------------------
# Genérico y Papelera
#-------------------------------------------
label open, has open = open -- "$@"
label trash, has trash-put = trash-put -- "$@"
# Si no tienes trash-cli, en Mac puedes usar 'rm' o mover a ~/.Trash
label trash = mv -- "$@" ~/.Trash
