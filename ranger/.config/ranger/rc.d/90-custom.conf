# Custom overrides live last so they intentionally replace earlier defaults.
map <C-f> fzf_select
map S smart_open
map DD smart_trash
map dr shell dragon -a -x %p
map cZ console shell zip -r %f.zip %s

map ex shell extract %f
map cz console z
map F fzf_content_search

map gs console spotlight

map gd go_downloads
map gb go_projects

map yot ocr_to_clipboard
map gl dev_open_in_lvim
map gt dev_tmux_lvim
map gv dev_tmux_split_lvim

# x* is reserved for project/system workflow commands.
map xp projects_menu
map xc clipboard_menu
map xf files_menu
map xi system_info_menu
map xs session_menu
map xw workspace_menu
map xa scratchpad_menu
map xm multimedia_menu
map xd downloads_recent
map xg git_file_actions
map xt open_terminal_here
map xl dev_open_in_lvim_root
map xn dev_tmux_project
map xv bulk_rename_lvim
map xr copy_repo_path
map xy copy_relative_path
map xe extract_here_smart
map xo todo_menu
map xk keybind_cheatsheet
map xC calculator_menu
map xU english_menu
map xH places_menu
map xN notes_actions
map xT run_project_task
map xR normalize_filenames
map xM move_selection_by_type
map xA open_with_context
map xF file_diagnostics

# Personal folders / places.
map gD go_documents
map gB go_desktop
map gP go_projects
map gO go_dotfiles
map gN go_notes
map gE go_dev
map gI go_pictures
map gS go_screenshots
map gW go_wallpapers
map gY go_music
map gV go_videos
